services:
  otel-collector:
    image: rockcraft-test:latest
    configs:
      - source: otelcol_config
        target: /etc/otelcol/config.yaml

configs:
  otelcol_config:
    content: |
      extensions:
        health_check:
          endpoint: 0.0.0.0:13133
        basicauth/prom:
          client_auth:
            username: admin
            password: password

      receivers:
        prometheus:
          config:
            scrape_configs:
            - job_name: 'self-monitoring'
              scrape_interval: 10s
              static_configs:
              - targets: ['0.0.0.0:8888']
                labels:
                  testlabel: testvalue

      exporters:
        debug:
          verbosity: detailed
        prometheus:
          endpoint: ":8889"
        prometheusremotewrite:
          endpoint: "http://prometheus:9090/api/v1/write"
          auth:
            authenticator: basicauth/prom

      service:
        pipelines:
          metrics:
            receivers: [prometheus]
            exporters: [debug, prometheus, prometheusremotewrite]
        extensions: [health_check, basicauth/prom]
        telemetry:
          metrics:
            level: basic
